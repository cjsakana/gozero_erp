message PermissionItem {
  int64 id = 1; //主键ID，雪花
  int64 parentId = 2; //父级权限ID。0：根节点
  string code = 3; //权限代码
  string description = 4; //权限描述/名称
  string url = 5; //url
  string method = 6; //method
  repeated PermissionItem child = 7; // 子权限
}

message GetAllPermissionsReq{}

message GetAllPermissionsResp{
  int64 total = 1;
  repeated PermissionItem permissions = 2;
}

service permission {
  //-----------------------permission-----------------------
