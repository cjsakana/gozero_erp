message UpdateSalesOrderReq{
  int64 id = 1; //销售订单ID
  int64 status = 7; //状态： 1-已确认 2-部分发货 3-已完成 4-已取消
  string contractUrl = 9; //合同URL
}
message UpdateSalesOrderResp{
}

message GetSalesOrderByIdReq {
  int64 id = 1; //id
}

message GetSalesOrderByIdResp {
  OrderWithDetails orderWithDetails=1;
}

message SearchSalesOrderReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  string orderNo = 4; //销售订单号
  int64 customerId = 5; //客户ID
  //  int64 orderDate = 6; //订单日期
  int64 status = 9; //状态：1-已确认 2-部分发货 3-已完成 4-已取消
  int64 salesmanId = 10; //销售员ID
  int64 startOrderDate = 11;
  int64 endOrderDate = 12;
}

message SearchSalesOrderResp {
  repeated OrderWithDetails orderWithDetails=1;
  int64 total = 2;
}

service salesOrder {

  //-----------------------salesOrder-----------------------
  rpc AddSalesOrder(AddSalesOrderReq) returns (AddSalesOrderResp);
  rpc UpdateSalesOrder(UpdateSalesOrderReq) returns (UpdateSalesOrderResp);
  rpc GetSalesOrderById(GetSalesOrderByIdReq) returns (GetSalesOrderByIdResp);
  rpc SearchSalesOrder(SearchSalesOrderReq) returns (SearchSalesOrderResp);
}
