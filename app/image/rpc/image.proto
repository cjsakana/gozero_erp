syntax = "proto3";

option go_package ="./pb";

package pb;

// ------------------------------------ 
// Messages
// ------------------------------------ 

//--------------------------------image--------------------------------
message Image {
  int64 id = 1; //图片ID（主键，自增）
  int64 businessType = 2; //业务类型 1-product
  int64 businessId = 3; //业务对象ID
  string imageUrl = 4; //图片访问URL
  int64 imageOrder = 5; //图片排序序号，数字越小越靠前
  int64 isMain = 6; //是否主图：1-是 2-否
  int64 uploadedBy = 7; //上传人id
  int64 createdAt = 8; //图片上传时间
  int64 updatedAt = 9; //图片更新时间
}

message AddImageReq {
  int64 businessType = 1; //业务类型 1-product
  int64 businessId = 2; //业务对象ID
  string imageUrl = 3; //图片访问URL
  int64 imageOrder = 4; //图片排序序号，数字越小越靠前
  int64 isMain = 5; //是否主图：1-是 2-否
  int64 uploadedBy = 6; //上传人id
  int64 createdAt = 7; //图片上传时间
  int64 updatedAt = 8; //图片更新时间
}

message AddImageResp {
}

message UpdateImageReq {
  int64 id = 1; //图片ID（主键，自增）
  int64 imageOrder = 5; //图片排序序号，数字越小越靠前
  int64 isMain = 6; //是否主图：1-是 2-否
}

message UpdateImageResp {
}

message DelImageReq {
  int64 id = 1; //id
}

message DelImageResp {
}

message GetImageByIdReq {
  int64 id = 1; //id
}

message GetImageByIdResp {
  Image image = 1; //image
}

message SearchImageReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  int64 businessType = 4; //业务类型 1-product
  int64 businessId = 5; //业务对象ID
}

message SearchImageResp {
  repeated Image image = 1; //image
}



// ------------------------------------ 
// Rpc Func
// ------------------------------------ 

service image{ 

	 //-----------------------image----------------------- 
	 rpc AddImage(AddImageReq) returns (AddImageResp); 
	 rpc UpdateImage(UpdateImageReq) returns (UpdateImageResp); 
	 rpc DelImage(DelImageReq) returns (DelImageResp); 
	 rpc GetImageById(GetImageByIdReq) returns (GetImageByIdResp); 
	 rpc SearchImage(SearchImageReq) returns (SearchImageResp);
}
