message AttendanceCheckerReq{}
message AttendanceCheckerResp{}


message GetAttendanceRecordByIdReq {
  int64 id = 1; //id
}

message GetAttendanceRecordByIdResp {
  AttendanceRecord attendanceRecord = 1; //attendanceRecord
}

message SearchAttendanceRecordReq {
  int64 page = 1; //页码
  int64 limit = 2; //每页数量
  int64 employeeId = 3; //员工ID（可选）
  int64 startDate = 4; //开始日期（时间戳，秒，可选）
  int64 endDate = 5; //结束日期（时间戳，秒，可选）
  optional bool isLate = 6; //筛选迟到记录（可选）
  optional bool isEarlyLeave = 7; //筛选早退记录（可选）
  optional bool isAmMissing = 8; //筛选缺上午卡记录（可选）
  optional bool isPmMissing = 9; //筛选缺下午卡记录（可选）
  string remark = 10; //备注关键词（模糊查询，可选）
}

message SearchAttendanceRecordResp {
  int64 total = 1;
  repeated AttendanceRecord attendanceRecord = 2; //attendanceRecord
}

//--------------------------------补卡申请表--------------------------------
message AttendanceReplenish {
  int64 id = 1; //id
  int64 employeeId = 2;//申请人ID
  int64 originalDate = 3; //需补卡的日期
  int64 applyTime = 4; //申请时间
  int64 replenishType = 5; //补卡类型：1-补上班 2-补下班 3-补全天
  int64 replenishTime = 6; //补卡时间（实际打卡时间）
  string reason = 7; //补卡原因
  string evidence = 8; //证明材料URL
  int64 status = 9; //状态：0-待审批 1-已通过 2-已拒绝
  int64 approverId = 10; //审批人ID
  int64 approveTime = 11; //审批时间
  string approveRemark = 12; //审批意见
}

message AddAttendanceReplenishReq {
  int64 employeeId = 1;//申请人ID
  int64 originalDate = 2; //需补卡的日期
  int64 replenishType = 4; //补卡类型：1-补上班 2-补下班 3-补全天
  int64 replenishTime = 5; //补卡时间（实际打卡时间）
  string reason = 6; //补卡原因
  string evidence = 7; //证明材料URL
  int64 approverId = 10; //审批人ID
}

message AddAttendanceReplenishResp {
  int64 id = 1; //id
}

message UpdateAttendanceReplenishReq {
  int64 id = 1; //id
  int64 originalDate = 3; //需补卡的日期
  int64 replenishType = 5; //补卡类型：1-补上班 2-补下班 3-补全天
  int64 replenishTime = 6; //补卡时间（实际打卡时间）
  string reason = 7; //补卡原因
  string evidence = 8; //证明材料URL
  int64 status = 9; //状态：0-待审批 1-已通过 2-已拒绝
  int64 approverId = 10; //审批人ID
  int64 approveTime = 11; //审批时间
  string approveRemark = 12; //审批意见
}

message UpdateAttendanceReplenishResp {
}

message GetAttendanceReplenishByIdReq {
  int64 id = 1; //id
}

message GetAttendanceReplenishByIdResp {
  AttendanceReplenish attendanceReplenish = 1; //attendanceReplenish
}

message SearchAttendanceReplenishReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  int64 employeeId = 3;//申请人ID
  int64 replenishType = 4; //补卡类型：1-补上班 2-补下班 3-补全天
  string reason = 5; //补卡原因
  int64 status = 6; //状态：0-待审批 1-已通过 2-已拒绝
  int64 approverId = 7; //审批人IDID
}

message SearchAttendanceReplenishResp {
  int64 total = 1;
  repeated AttendanceReplenish attendanceReplenish = 2; //attendanceReplenish
}

