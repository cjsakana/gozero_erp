message SearchLeaveApplicationReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  int64 employeeId = 4; //申请人
  int64 type = 5; //类型：1-年假 2-病假 3-事假
  int64 startTime = 6; //开始时间
  int64 endTime = 7; //结束时间
  string reason = 8; //请假原因
  int64 status = 9; //状态：0-审批中 1-已通过 2-已拒绝
