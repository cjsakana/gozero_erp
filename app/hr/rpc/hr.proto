// ------------------------------------ 
// Rpc Func
// ------------------------------------ 

service attendanceRecord{

  //-----------------------考勤记录表-----------------------
  rpc Clock(ClockReq)returns(ClockResp);
  //  rpc AddAttendanceRecord(AddAttendanceRecordReq) returns (AddAttendanceRecordResp);
  //  rpc UpdateAttendanceRecord(UpdateAttendanceRecordReq) returns (UpdateAttendanceRecordResp);
  rpc AttendanceChecker (AttendanceCheckerReq)returns(AttendanceCheckerResp);
  rpc GetAttendanceRecordById(GetAttendanceRecordByIdReq) returns (GetAttendanceRecordByIdResp);
  rpc SearchAttendanceRecord(SearchAttendanceRecordReq) returns (SearchAttendanceRecordResp);
}

service attendanceReplenish{
  //-----------------------补卡申请表-----------------------
  rpc AddAttendanceReplenish(AddAttendanceReplenishReq) returns (AddAttendanceReplenishResp);
  rpc UpdateAttendanceReplenish(UpdateAttendanceReplenishReq) returns (UpdateAttendanceReplenishResp);
  rpc GetAttendanceReplenishById(GetAttendanceReplenishByIdReq) returns (GetAttendanceReplenishByIdResp);
  rpc SearchAttendanceReplenish(SearchAttendanceReplenishReq) returns (SearchAttendanceReplenishResp);
}

service department{

  //-----------------------部门表-----------------------
  rpc AddDepartment(AddDepartmentReq) returns (AddDepartmentResp);
//  rpc BulkAddDepartment(BulkAddDepartmentReq) returns (BulkAddDepartmentResp);
  rpc UpdateDepartment(UpdateDepartmentReq) returns (UpdateDepartmentResp);
  rpc DelDepartment(DelDepartmentReq) returns (DelDepartmentResp);
  rpc GetDepartmentById(GetDepartmentByIdReq) returns (GetDepartmentByIdResp);
  rpc SearchDepartment(SearchDepartmentReq) returns (SearchDepartmentResp);
}

service employeeDetail{
  //-----------------------员工信息扩展表-----------------------
  rpc AddEmployeeDetail(AddEmployeeDetailReq) returns (AddEmployeeDetailResp);
  // 已废弃：补偿由 Msg 实现。原说明：Saga 补偿：删除新增的员工扩展信息，入参与 AddEmployeeDetailReq 相同
//  rpc CompensateAddEmployeeDetail(AddEmployeeDetailReq) returns (DelEmployeeDetailResp);
  rpc BulkAddEmployeeDetail(BulkAddEmployeeDetailReq) returns (BulkAddEmployeeDetailResp);
  rpc UpdateEmployeeDetail(UpdateEmployeeDetailReq) returns (UpdateEmployeeDetailResp);
  // 已废弃：补偿由 Msg 实现。原说明：Saga 补偿：将离职日期回滚为未离职（与正向同请求体，约定 leaveDate=0 表示清空）
//  rpc CompensateUpdateEmployeeDetail(UpdateEmployeeDetailReq) returns (UpdateEmployeeDetailResp);
