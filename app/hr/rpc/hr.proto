//}

//message DelPayrollRecordResp {
//}
//
message GetPayrollRecordByIdReq {
  int64 id = 1; //id
}

message GetPayrollRecordByIdResp {
  PayrollRecord payrollRecord = 1; //payrollRecord
}

message SearchPayrollRecordReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  int64 paymentMonth =3 ; //薪资月份(如2025-06-01表示6月)
  int64 employeeId = 4; //员工no
  int64 status = 6; //状态：1-未发放, 2-待发放, 3-已发放, 4-发放失败
