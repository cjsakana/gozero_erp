//--------------------------------员工信息扩展表--------------------------------
message EmployeeDetail {
  int64 id = 1; //员工ID
  string employeeNo = 2; //员工NO
  string name = 3; // 真实姓名
  string idCard = 4; //身份证号
  string account = 5; //银行卡号
  int64 gender = 6; //性别：1-男 2-女
  int64 birthDate = 7; //出生日期
  int64 departmentId = 8; //所属部门
  int64 positionId = 9; //职位
  double salary = 10; //基本工资
  int64 hireDate = 11; //入职日期
  int64 leaveDate = 12; //离职日期
}

message AddEmployeeDetailItem{
  int64 id = 1; //员工ID
  string employeeNo = 2; //员工NO
  string name = 3; // 真实姓名
  string idCard = 4; //身份证号
  string account = 5; //银行卡号
  int64 gender = 6; //性别：1-男 2-女
  int64 departmentId = 8; //所属部门
  int64 positionId = 9; //职位
  double salary = 10; //基本工资
  int64 hireDate = 11; //入职日期
}

message AddEmployeeDetailReq {
  AddEmployeeDetailItem employeeDetail = 1;
}

message AddEmployeeDetailResp {
  int64 id=1;
}

message BulkAddEmployeeDetailReq {
  repeated AddEmployeeDetailItem employeeDetails = 1;
}

message BulkAddEmployeeDetailErrItem {
  int64 index = 1;  // excel中第几条
