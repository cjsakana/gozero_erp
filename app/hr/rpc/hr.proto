  int64 approveTime = 11; //审批时间
  string approveRemark = 12; //审批意见
}

message UpdateLeaveApplicationResp {
}


message GetLeaveApplicationByIdReq {
  int64 id = 1; //id
}

message GetLeaveApplicationByIdResp {
