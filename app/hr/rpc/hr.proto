syntax = "proto3";

option go_package = "./pb";

package pb;

//--------------------------------考勤记录表--------------------------------
message AttendanceRecord {
  int64 id = 1; //主键ID
  int64 employeeId = 2; //员工ID
  int64 date = 3; //日期（时间戳，秒）
  int64 clockIn = 4; //上班打卡时间（时间戳，秒，0表示未打卡）
  int64 clockOut = 5; //下班打卡时间（时间戳，秒，0表示未打卡）
  bool isAmMissing = 6; //是否缺上午卡
  bool isLate = 7; //是否迟到
  bool isPmMissing = 8; //是否缺下午卡
  bool isEarlyLeave = 9; //是否早退
  double workHours = 10; //实际工作时长(小时)
  double overtimeHours = 11; //加班时长(小时)
  string remark = 12; //备注
}

message ClockReq{
  int64 employeeId = 1;//员工ID
  int64 clockTime = 2; //打卡时间
}
message ClockResp{
}

