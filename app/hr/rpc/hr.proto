//--------------------------------payrollRecord--------------------------------
message PayrollRecord {
  int64 id = 1; //薪酬ID
  int64 employeeId = 2; //员工ID
  int64 paymentMonth =3 ; //薪资月份(如2025-06-01表示6月)
  double baseSalary = 4; //基本工资
  double bonus = 5; //奖金
  double deductions = 6; //扣款
  double netSalary = 7; //实发工资
  int64 calculatedBy = 8; //核算人ID
  int64 calculatedAt = 9; //核算日期时间
  int64 status = 10; //薪酬状态：0-未核算，1-已核算，2-已提交，3-待发放，4-已发放，5-发放失败
  string description = 11; //描述/备注
  int64 paymentAt = 12; //发放日期
  int64 createdAt = 13; //创建时间
}

message AddPayrollRecordReq {
  int64 employeeId = 1; //员工ID
  int64 paymentMonth =2 ; //薪资月份(如2025-06-01表示6月)
  double bonus = 3; //奖金
  double deductions = 4; //扣款
  string description = 5; //描述/备注
  int64 calculatedBy = 8; //核算人ID
  int64 calculatedAt = 9; //核算日期时间
}
message AddPayrollRecordResp {
  int64 id = 1; //薪酬ID
}

message AddPayrollRecordItem{
  int64 employeeId = 1; //员工ID
  int64 paymentMonth =2 ; //薪资月份(如2025-06-01表示6月)
  double bonus = 3; //奖金
  double deductions = 4; //扣款
  string description = 5; //描述/备注
  int64 calculatedBy = 8; //核算人ID
  int64 calculatedAt = 9; //核算日期时间
}


message BulkAddPayrollRecordReq {
  repeated AddPayrollRecordItem payrollRecords = 1;
}

message BulkAddPayrollRecordErrItem {
  int64 employeeId = 1; //员工ID
  string error = 2;
}

message BulkAddPayrollRecordResp {
  int64 successCount = 1;
  int64 errorCount = 2;
  repeated BulkAddPayrollRecordErrItem items = 3;
}

message UpdatePayrollRecordReq {
  int64 id = 1; //薪酬ID
  double bonus = 4; //奖金
  double deductions = 5; //扣款
  int64 calculatedBy = 7; //核算人ID
  int64 calculatedAt = 8; //核算日期时间
  int64 status = 9; //薪酬状态：0-未核算，1-已核算，2-已提交，3-待发放，4-已发放，5-发放失败
  string description = 10; //描述/备注
  int64 paymentAt = 11; //发放日期
}

message UpdatePayrollRecordResp {
}

