message GenerateMonthlyPayrollReq {
  int64 year = 1;   // 目标年份，未传或为0则取上月的年份
  int64 month = 2;  // 目标月份(1-12)，未传或为0则取上月月份
  bool overwrite = 3; // 是否覆盖已存在的该期工资（未实现 period 字段时将以近似幂等策略处理）
}

message GenerateMonthlyPayrollResp {
  int64 successCount = 1;
  int64 failCount = 2;
  repeated int64 failedEmployeeIds = 3;
}

