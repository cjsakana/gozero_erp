syntax = "proto3";

option go_package = "./pb";

package pb;

// ------------------------------------ 
// Messages
// ------------------------------------ 

//--------------------------------supplier--------------------------------
message Supplier {
  int64 id = 1; //供应商ID
  string code = 2; //供应商企业编码
  string uscc = 3; //统一社会信用代码
  string name = 4; //供应商名称
  string contact = 5; //联系人
  string phone = 6; //联系电话
  string address = 7; //地址
  string paymentTerms = 8; //付款条件
  string credit = 9; //信用等级: ABCDE
  int64 isActive = 10; //是否合作中: 1-合作 2-不合作
  int64 createdAt = 11; //创建时间
  int64 createdBy = 12; //创建人ID
  int64 updatedAt = 13; //更新时间
  int64 updatedBy = 14; //更新人ID
}

message AddSupplierReq {
  string code = 1; //供应商企业编码
  string name = 2; //供应商名称
  string contact = 3; //联系人
  string phone = 4; //联系电话
  string address = 5; //地址
  string paymentTerms = 6; //付款条件
  string credit = 7; //信用等级: ABCDE
  int64 isActive = 8; //是否合作中
  string uscc = 9; //统一社会信用代码
  int64 createdBy = 12; //创建人ID
}

message AddSupplierResp {
  int64 id = 1; //供应商ID
}

message UpdateSupplierReq {
  int64 id = 1; //供应商ID
  string name = 3; //供应商名称
  string contact = 4; //联系人
  string phone = 5; //联系电话
  string address = 6; //地址
  string paymentTerms = 7; //付款条件
  string credit = 8; //信用等级: ABCDE
  int64 isActive = 9; //是否合作中
  int64 updatedBy = 14; //更新人ID
}

message UpdateSupplierResp {
}


message GetSupplierByIdReq {
  int64 id = 1; //id
}

message GetSupplierByIdResp {
  Supplier supplier = 1; //supplier
}

message SearchSupplierReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  string code = 4; //供应商企业编码
  string name = 5; //供应商名称
  string contact = 6; //联系人
  string address = 8; //地址
  string paymentTerms = 9; //付款条件
  string credit = 10; //信用等级: ABCDE
  int64 isActive = 11; //是否合作中
  string uscc = 12; //统一社会信用代码
}

message SearchSupplierResp {
  repeated Supplier supplier = 1; //supplier
  int64 total=2;
}

//--------------------------------supplierEvaluation--------------------------------
message SupplierEvaluation {
  int64 id = 1; //评估ID
  int64 supplierId = 2; //供应商ID
  double qualityScore = 3; //质量评分
  double deliveryScore = 4; //交付评分
  double serviceScore = 5; //服务评分
  double overallScore = 6; //综合评分
  int64 evaluatorId = 7; //评估人
  string remark = 8;
  int64 createdAt = 9; //评估日期
}

message AddSupplierEvaluationReq {
  int64 supplierId = 1; //供应商ID
  double qualityScore = 2; //质量评分
  double deliveryScore = 3; //交付评分
  double serviceScore = 4; //服务评分
  double overallScore = 5; //综合评分
  int64 evaluatorId = 6; //评估人
  string remark = 7;

}

message AddSupplierEvaluationResp {
  int64 id = 1;
}



message GetSupplierEvaluationByIdReq {
  int64 id = 1; //id
}

message GetSupplierEvaluationByIdResp {
  SupplierEvaluation supplierEvaluation = 1; //supplierEvaluation
}

message SearchSupplierEvaluationReq {
  int64 page = 1; //page
  int64 limit = 2; //limit
  int64 supplierId = 3; //供应商ID

  double qualityMin = 4; //质量评分
  double qualityMax = 5; //质量评分
  string qualityOp = 6; //质量评分操作符: gt/gte/eq/lt/lte

  double deliveryMin = 7; //交付评分
  double deliveryMax = 8; //交付评分
  string deliveryOp = 9;

  double serviceMin = 10; //服务评分
  double serviceMax = 11; //服务评分
  string serviceOp = 12;

  double overallMin = 13; //综合评分
  double overallMax = 14; //综合评分
  string overallOp = 15;

  int64 startDate = 16;
  int64 endDate = 17;
  int64 evaluatorId = 18; //评估人
}

message SearchSupplierEvaluationResp {
  repeated SupplierEvaluation supplierEvaluation = 1; //supplierEvaluation
  int64 total=2;

}



// ------------------------------------ 
// Rpc Func
// ------------------------------------ 

service supplier{

  //-----------------------supplier-----------------------
  rpc AddSupplier(AddSupplierReq) returns (AddSupplierResp);
  rpc UpdateSupplier(UpdateSupplierReq) returns (UpdateSupplierResp);
  //	 rpc DelSupplier(DelSupplierReq) returns (DelSupplierResp);
  rpc GetSupplierById(GetSupplierByIdReq) returns (GetSupplierByIdResp);
  rpc SearchSupplier(SearchSupplierReq) returns (SearchSupplierResp);
  //-----------------------supplierEvaluation-----------------------
  rpc AddSupplierEvaluation(AddSupplierEvaluationReq) returns (AddSupplierEvaluationResp);
  //	 rpc UpdateSupplierEvaluation(UpdateSupplierEvaluationReq) returns (UpdateSupplierEvaluationResp);
  //	 rpc DelSupplierEvaluation(DelSupplierEvaluationReq) returns (DelSupplierEvaluationResp);
  rpc GetSupplierEvaluationById(GetSupplierEvaluationByIdReq) returns (GetSupplierEvaluationByIdResp);
  rpc SearchSupplierEvaluation(SearchSupplierEvaluationReq) returns (SearchSupplierEvaluationResp);

}
