# Nginx反向代理配置文件
# 将多个不同端口的API接口统一代理到一个端口

events {
    worker_connections 1024;
}

http {
    # 定义上游服务器组
    upstream auth_api {
        server 127.0.0.1:8001;
    }

    upstream user_api {
        server 127.0.0.1:8002;
    }

    upstream hr_api {
        server 127.0.0.1:8003;
    }

    upstream product_api {
        server 127.0.0.1:8004;
    }

    upstream inventory_api {
        server 127.0.0.1:8005;
    }

    upstream supplier_api {
        server 127.0.0.1:8006;
    }

    upstream customer_api {
        server 127.0.0.1:8007;
    }

    upstream sale_api {
        server 127.0.0.1:8008;
    }

    upstream purchase_api {
        server 127.0.0.1:8009;
    }

    upstream finance_api {
        server 127.0.0.1:8010;
    }

    upstream image_api {
        server 127.0.0.1:8011;
    }

    upstream production_api {
        server 127.0.0.1:8020;
    }

    # HTTPS服务器配置（推荐）
    server {
        listen 8443 ssl;
        http2 on;
        server_name localhost;  # 可根据实际情况修改为域名或IP

        # SSL证书配置
        ssl_certificate ../ca/selfsigned.crt;
        ssl_certificate_key ../ca/private.key;

        # SSL优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 日志配置（Windows路径，可根据实际情况调整）
        access_log logs/erp_api_https_access.log;
        error_log logs/erp_api_https_error.log;

        # 客户端请求体大小限制（可根据需要调整）
        client_max_body_size 100M;

        # 超时设置（文件上传需要更长的超时时间）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;

        # 代理缓冲配置（优化文件上传性能）
        proxy_buffering off;  # 关闭缓冲，直接流式传输大文件
        proxy_request_buffering off;  # 关闭请求缓冲，允许流式上传
        proxy_http_version 1.1;  # 使用 HTTP/1.1 以支持 keepalive
        proxy_set_header Connection "";  # 保持连接

        # 通用代理头设置（在location块中会被继承）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # 告诉后端使用 HTTPS

        # 确保 Cookie 正确传递（erp中已经不使用Cookie）
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;

        # 认证服务 - 权限管理
        location /api/v1/permission/ {
            include cors.conf;
            proxy_pass http://auth_api;
        }

        # 认证服务 - 角色管理
        location /api/v1/role/ {
            include cors.conf;
            proxy_pass http://auth_api;
        }

        # 认证服务 - 角色权限管理
        location /api/v1/rolePermission/ {
            include cors.conf;
            proxy_pass http://auth_api;
        }

        # 认证服务 - 用户角色管理
        location /api/v1/userRole/ {
            include cors.conf;
            proxy_pass http://auth_api;
        }

        # 认证服务
        location /api/v1/auth/ {
            include cors.conf;
            proxy_pass http://auth_api;
        }

        # 用户服务 - 文件上传接口（需要特殊配置，放在通用配置之前）
        location = /api/v1/user/uploadAvatar {
            include cors.conf;
            proxy_pass http://user_api;
            
            # 文件上传专用超时配置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;
            
            # 关闭缓冲以支持大文件上传
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 保持连接
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 用户服务
        location /api/v1/user/ {
            include cors.conf;
            proxy_pass http://user_api;
        }

        # HR服务 - 部门管理
        location /api/v1/department/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 岗位管理
        location /api/v1/position/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 员工详情
        location /api/v1/employeeDetail/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 离职申请
        location /api/v1/resigned/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 考勤管理
        location /api/v1/attendance/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 考勤补卡
        location /api/v1/attendanceReplenish/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 请假管理
        location /api/v1/leave/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务 - 薪酬管理
        location /api/v1/payroll/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # HR服务
        location /api/v1/hr/ {
            include cors.conf;
            proxy_pass http://hr_api;
        }

        # 产品服务 - 产品分类
        location /api/v1/productCategory/ {
            include cors.conf;
            proxy_pass http://product_api;
        }

        # 产品服务 - 产品批次
        location /api/v1/productBatch/ {
            include cors.conf;
            proxy_pass http://product_api;
        }

        # 产品服务
        location /api/v1/product/ {
            include cors.conf;
            proxy_pass http://product_api;
        }

        # 生产任务
        location /api/v1/production/ {
            include cors.conf;
            proxy_pass http://production_api;
        }

        # 库存服务 - 仓库管理
        location /api/v1/warehouse/ {
            include cors.conf;
            proxy_pass http://inventory_api;
        }

        # 库存服务
        location /api/v1/inventory/ {
            include cors.conf;
            proxy_pass http://inventory_api;
        }

        # 供应商服务 - 供应商评估
        location /api/v1/supplierEvaluation/ {
            include cors.conf;
            proxy_pass http://supplier_api;
        }

        # 供应商服务
        location /api/v1/supplier/ {
            include cors.conf;
            proxy_pass http://supplier_api;
        }

        # 客户服务 - 客户分类
        location /api/v1/customerCategory/ {
            include cors.conf;
            proxy_pass http://customer_api;
        }

        # 客户服务 - 客户满意度
        location /api/v1/satisfaction/ {
            include cors.conf;
            proxy_pass http://customer_api;
        }

        # 客户服务
        location /api/v1/customer/ {
            include cors.conf;
            proxy_pass http://customer_api;
        }

        # 销售服务 - 销售出库
        location /api/v1/salesDelivery/ {
            include cors.conf;
            proxy_pass http://sale_api;
        }

        # 销售服务 - 销售订单
        location /api/v1/salesOrder/ {
            include cors.conf;
            proxy_pass http://sale_api;
        }

        # 销售服务
        location /api/v1/sale/ {
            include cors.conf;
            proxy_pass http://sale_api;
        }

        # 采购服务 - 采购申请
        location /api/v1/purchase/requisition/ {
            include cors.conf;
            proxy_pass http://purchase_api;
        }

        # 采购服务 - 采购订单
        location /api/v1/purchase/order/ {
            include cors.conf;
            proxy_pass http://purchase_api;
        }

        # 采购服务 - 采购入库
        location /api/v1/purchase/receipt/ {
            include cors.conf;
            proxy_pass http://purchase_api;
        }

        # 采购服务
        location /api/v1/purchase/ {
            include cors.conf;
            proxy_pass http://purchase_api;
        }

        # 财务服务 - 固定资产
        location /api/v1/finance/fixedAsset/ {
            include cors.conf;
            proxy_pass http://finance_api;
        }

        # 财务服务 - 付款记录
        location /api/v1/finance/paymentRecord/ {
            include cors.conf;
            proxy_pass http://finance_api;
        }

        # 财务服务 - 收款记录
        location /api/v1/finance/receiptRecord/ {
            include cors.conf;
            proxy_pass http://finance_api;
        }

        # 财务服务 - 工资支付
        location /api/v1/finance/salaryPayment/ {
            include cors.conf;
            proxy_pass http://finance_api;
        }

        # 财务服务
        location /api/v1/finance/ {
            include cors.conf;
            proxy_pass http://finance_api;
        }

        # 图片服务 - 文件上传接口（需要特殊配置，放在通用配置之前）
        location = /api/v1/image/upload {
            include cors.conf;
            proxy_pass http://image_api;

            # 文件上传专用超时配置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;

            # 关闭缓冲以支持大文件上传
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 保持连接
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 图片服务
        location /api/v1/image/ {
            include cors.conf;
            proxy_pass http://image_api;
        }

        # 健康检查端点（可选）
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 根路径重定向（可选）
        location = / {
            return 200 "ERP API Gateway (HTTPS)\n";
            add_header Content-Type text/plain;
        }
    }
}